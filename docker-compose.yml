version: '3.8'

services:
  app:
    build: .
    container_name: auto_car_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:latest
    container_name: auto_car_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
